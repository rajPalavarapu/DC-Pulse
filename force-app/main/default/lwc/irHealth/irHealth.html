<template>
    <div class="slds-p-around_medium">

        <!-- Error -->
        <template lwc:if={errorMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                <span>{errorMessage}</span>
            </div>
        </template>

        <!-- ── SECTION 1: IR Summary ── -->
        <template lwc:if={isLoadingSummary}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <lightning-spinner alternative-text="Loading IR summary" size="medium"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={irSummary}>
            <div class="slds-box slds-m-bottom_medium">
                <p class="slds-text-title_caps slds-m-bottom_small">Identity Resolution Summary</p>

                <div class="slds-grid slds-gutters">

                    <div class="slds-col slds-size_1-of-3">
                        <div class="slds-box slds-theme_shade slds-text-align_center">
                            <p class="slds-text-title_caps slds-m-bottom_x-small">Unified Profiles</p>
                            <p class="slds-text-heading_large">{irSummary.totalUnified}</p>
                            <p class="slds-text-color_weak slds-text-body_small">Total unified individuals</p>
                        </div>
                    </div>

                    <div class="slds-col slds-size_1-of-3">
                        <div class="slds-box slds-theme_shade slds-text-align_center">
                            <p class="slds-text-title_caps slds-m-bottom_x-small">Source Records</p>
                            <p class="slds-text-heading_large">{irSummary.totalLinks}</p>
                            <p class="slds-text-color_weak slds-text-body_small">Total source records linked</p>
                        </div>
                    </div>

                    <div class="slds-col slds-size_1-of-3">
                        <div class="slds-box slds-theme_shade slds-text-align_center">
                            <p class="slds-text-title_caps slds-m-bottom_x-small">Avg Merges / Profile</p>
                            <p class="slds-text-heading_large">{irSummary.avgLinksPerProfile}</p>
                            <p class="slds-text-color_weak slds-text-body_small">Source records per unified profile</p>
                        </div>
                    </div>

                </div>
            </div>
        </template>

        <!-- ── SECTION 2: Suspicious Merge Detector ── -->
        <div class="slds-box slds-m-bottom_medium">
            <p class="slds-text-title_caps slds-m-bottom_x-small">Suspicious Merge Detector</p>
            <p class="slds-text-color_weak slds-text-body_small slds-m-bottom_small">
                Profiles with {suspiciousThreshold} or more source records merged. High merge counts often indicate placeholder emails, generic phone numbers, or over-broad match rules.
            </p>

            <div class="slds-grid slds-gutters slds-m-bottom_small">
                <div class="slds-col slds-size_3-of-12">
                    <lightning-input
                        type="number"
                        label="Merge count threshold"
                        value={suspiciousThresholdInput}
                        min="2"
                        step="1"
                        onchange={handleThresholdChange}>
                    </lightning-input>
                </div>
                <div class="slds-col slds-size_2-of-12 slds-align-bottom">
                    <lightning-button
                        label="Apply"
                        variant="brand"
                        onclick={handleThresholdApply}>
                    </lightning-button>
                </div>
            </div>

            <template lwc:if={isLoadingSuspicious}>
                <div class="slds-align_absolute-center slds-p-around_medium">
                    <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                </div>
            </template>

            <template lwc:if={hasSuspiciousMerges}>
                <div class="slds-notify slds-notify_alert slds-theme_warning slds-m-bottom_small" role="alert">
                    <lightning-icon icon-name="utility:warning" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    <strong>{suspiciousMerges.length} profile(s) have {suspiciousThreshold} or more source records merged.</strong> Click a row to inspect the source records.
                    <lightning-button-icon
                        icon-name={suspiciousToggleIcon}
                        alternative-text={suspiciousToggleLabel}
                        variant="bare"
                        class="slds-m-left_small"
                        onclick={handleToggleSuspicious}>
                    </lightning-button-icon>
                </div>
                <template lwc:if={suspiciousExpanded}>
                    <lightning-datatable
                        key-field="unifiedId"
                        data={suspiciousMerges}
                        columns={suspiciousColumns}
                        hide-checkbox-column
                        onrowaction={handleSuspiciousSelect}>
                    </lightning-datatable>
                </template>
            </template>

            <template lwc:if={noSuspiciousMerges}>
                <div class="slds-notify slds-notify_alert slds-theme_success" role="alert">
                    <lightning-icon icon-name="utility:check" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    No profiles with {suspiciousThreshold} or more source records merged. IR rules look healthy.
                </div>
            </template>

        </div>

        <!-- ── SECTION 3: Profile Lookup ── -->
        <div class="slds-box slds-m-bottom_medium">
            <p class="slds-text-title_caps slds-m-bottom_x-small">Unified Profile Lookup</p>
            <p class="slds-text-color_weak slds-text-body_small slds-m-bottom_small">Search by first or last name to inspect how a profile was merged.</p>

            <template lwc:if={selectedProfile}>

                <!-- Drill-down view -->
                <div>
                    <div class="slds-grid slds-gutters slds-m-bottom_small slds-align_absolute-center">
                        <div class="slds-col">
                            <lightning-button
                                label="Back to Search"
                                icon-name="utility:chevronleft"
                                onclick={handleBackToSearch}>
                            </lightning-button>
                        </div>
                        <div class="slds-col slds-grow">
                            <p class="slds-text-heading_small"><strong>{selectedProfileName}</strong></p>
                            <p class="slds-text-color_weak slds-text-body_small">{selectedProfile.unifiedId}</p>
                        </div>
                    </div>

                    <template lwc:if={isLoadingDetail}>
                        <div class="slds-align_absolute-center slds-p-around_medium">
                            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                        </div>
                    </template>

                    <template lwc:if={mergeDetail}>
                        <p class="slds-text-title_caps slds-m-bottom_x-small">Merged Source Records ({mergeCount})</p>

                        <template lwc:if={isMergeCountHigh}>
                            <div class="slds-notify slds-notify_alert slds-theme_warning slds-m-bottom_small" role="alert">
                                <lightning-icon icon-name="utility:warning" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                <strong>{mergeCount} source records merged into this profile.</strong> Review the data sources below — a placeholder email or generic phone number may be causing over-merging.
                            </div>
                        </template>

                        <!-- Hub and Spoke Chart -->
                        <template lwc:if={hasMergeChart}>
                            <div class="slds-box slds-m-bottom_medium" style="overflow-x:auto; overflow-y:hidden; background:#fafafa; border-radius:8px;">
                                <p class="slds-text-title_caps slds-m-bottom_x-small slds-p-top_small slds-p-left_small">Merge Graph</p>
                                <p class="slds-text-color_weak slds-text-body_small slds-m-bottom_small slds-p-left_small">Unified profile at center — source records radiating outward</p>
                                <template lwc:if={mergeChartCapped}>
                                    <div class="slds-notify slds-notify_alert slds-theme_info slds-m-horizontal_small slds-m-bottom_small" role="alert" style="border-radius:4px;">
                                        <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                        Showing first 12 of {mergeCount} source records in the graph. <strong>See the full list in the table below.</strong>
                                    </div>
                                </template>
                                <svg viewBox={mergeChart.viewBox} style={mergeChart.svgStyle} xmlns="http://www.w3.org/2000/svg">

                                    <!-- Spoke lines -->
                                    <template for:each={mergeChart.nodes} for:item="node">
                                        <line key={node.spokeKey}
                                            x1={mergeChart.cx} y1={mergeChart.cy}
                                            x2={node.nx} y2={node.ny}
                                            stroke="#c9d9e8" stroke-width="1.5"/>
                                    </template>

                                    <!-- Center node -->
                                    <circle cx={mergeChart.cx} cy={mergeChart.cy} r={mergeChart.centerR} fill="#0176d3"/>
                                    <text x={mergeChart.cx} y={mergeChart.centerY1} text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="Arial, sans-serif">Unified</text>
                                    <text x={mergeChart.cx} y={mergeChart.centerY2} text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="Arial, sans-serif">Profile</text>
                                    <text x={mergeChart.cx} y={mergeChart.centerY3} text-anchor="middle" fill="#cce5ff" font-size="10" font-family="Arial, sans-serif">{selectedProfileName}</text>

                                    <!-- Numbered nodes + outside labels -->
                                    <template for:each={mergeChart.nodes} for:item="node">
                                        <g key={node.nodeKey}>
                                            <!-- Numbered circle -->
                                            <circle cx={node.nx} cy={node.ny} r="22" fill="#f4f6f9" stroke="#0176d3" stroke-width="2"/>
                                            <text x={node.nx} y={node.ny} dy="5" text-anchor="middle"
                                                fill="#0176d3" font-size="13" font-weight="700" font-family="Arial, sans-serif">{node.index}</text>
                                            <!-- Data Source — grey -->
                                            <text x={node.lx} y={node.ly1} text-anchor={node.anchor}
                                                fill="#706e6b" font-size="11" font-family="Arial, sans-serif">{node.dsLabel}</text>
                                            <!-- Data Source Object — bold blue -->
                                            <text x={node.lx} y={node.ly2} text-anchor={node.anchor}
                                                fill="#0176d3" font-size="12" font-weight="700" font-family="Arial, sans-serif">{node.dsoLabel}</text>
                                            <!-- Source Record ID — light grey -->
                                            <text x={node.lx} y={node.ly3} text-anchor={node.anchor}
                                                fill="#a8a8a8" font-size="10" font-family="Arial, sans-serif">{node.srcShort}</text>
                                        </g>
                                    </template>

                                </svg>
                            </div>
                        </template>

                        <!-- Detail Table -->
                        <lightning-datatable
                            key-field="sourceRecordId"
                            data={mergeDetail}
                            columns={mergeDetailColumns}
                            hide-checkbox-column>
                        </lightning-datatable>
                    </template>
                </div>

            </template>

            <template lwc:else>

                <!-- Search input -->
                <div class="slds-grid slds-gutters slds-m-bottom_small">
                    <div class="slds-col slds-size_10-of-12">
                        <lightning-input
                            type="search"
                            label="Search by name"
                            placeholder="Enter first or last name..."
                            value={searchTerm}
                            onchange={handleSearchChange}
                            onkeyup={handleSearchKeyUp}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_2-of-12 slds-align-bottom">
                        <lightning-button
                            label="Search"
                            variant="brand"
                            onclick={handleSearchClick}>
                        </lightning-button>
                    </div>
                </div>

                <template lwc:if={isSearching}>
                    <div class="slds-align_absolute-center slds-p-around_medium">
                        <lightning-spinner alternative-text="Searching" size="small"></lightning-spinner>
                    </div>
                </template>

                <template lwc:if={hasSearchResults}>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_x-small">Click a row to view merged source records.</p>
                    <lightning-datatable
                        key-field="unifiedId"
                        data={searchResults}
                        columns={searchResultColumns}
                        hide-checkbox-column
                        onrowaction={handleProfileSelect}>
                    </lightning-datatable>
                </template>

                <template lwc:if={noSearchResults}>
                    <p class="slds-text-color_weak slds-text-body_small">No profiles found matching "{searchTerm}".</p>
                </template>

            </template>
        </div>

    </div>
</template>
